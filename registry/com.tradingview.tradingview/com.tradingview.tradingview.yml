id: com.tradingview.tradingview
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
# Electron app: use the Electron base app for zypak instead of disabling
# Chromium's sandbox.
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: tradingview
separate-locales: false
build-options:
  no-debuginfo: true
tags:
  - proprietary
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=xdg-download:ro
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.secrets
  - --unset-env=ELECTRON_RUN_AS_NODE
modules:
  - name: tradingview
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 tradingview-wrapper /app/bin/tradingview
      - install -Dm644 com.tradingview.tradingview.desktop /app/share/applications/com.tradingview.tradingview.desktop
      - install -Dm644 com.tradingview.tradingview.metainfo.xml /app/share/metainfo/com.tradingview.tradingview.metainfo.xml
      - install -Dm644 com.tradingview.tradingview.png /app/share/icons/hicolor/512x512/apps/com.tradingview.tradingview.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: tradingview.deb
        only-arches:
          - x86_64
        url: https://tvd-packages.tradingview.com/ubuntu/stable/pool/multiverse/t/tradingview/jammy/tradingview-3.3.0-1_amd64.deb
        sha256: d560cf9ea0c14c3949c24a5b8b62d26bc39b99e2a1f6ec4c8207245a9001ee49
        size: 128249270
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: tradingview-wrapper
      - type: file
        path: com.tradingview.tradingview.desktop
      - type: file
        path: com.tradingview.tradingview.metainfo.xml
      - type: file
        path: com.tradingview.tradingview.png
