id: com.browseros.BrowserOS
name: BrowserOS
summary: Open-source agentic browser built on Chromium
website: https://www.browseros.com/
source_url: https://github.com/browseros-ai/BrowserOS
build:
  manifest: com.browseros.BrowserOS.yml
  branch: stable
  mode: extra-data
catalog:
  category: Network
  tags:
    - Browser
    - Chromium
    - AI
    - Agent
update:
  command: ./resolve-update.sh
policy:
  proprietary: false
  extra_data_first: true
  dangerous_permissions:
    - --device=all

