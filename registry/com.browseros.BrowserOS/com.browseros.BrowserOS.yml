id: com.browseros.BrowserOS
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
# Chromium/Cobalt app: use the Chromium base app for cobalt and build zypak
# below so BrowserOS can use Chromium's Flatpak-friendly sandbox path instead
# of requiring a setuid chrome-sandbox helper.
base: org.chromium.Chromium.BaseApp
base-version: "25.08"
command: browseros
separate-locales: false
build-options:
  no-debuginfo: true
finish-args:
  - --require-version=1.8.2
  # Display, network, audio and GPU acceleration for normal browser use.
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  # Browser features: printing, smart cards/FIDO2, Bluetooth CTAP hybrid
  # transport, WebRTC screen capture and camera/USB devices.
  - --socket=cups
  - --socket=pcsc
  - --allow=bluetooth
  - --system-talk-name=org.bluez
  - --filesystem=xdg-run/pipewire-0
  - --device=all
  # System and desktop integration used by Chromium-family browsers.
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --talk-name=org.gnome.SessionManager
  - --talk-name=org.gnome.ScreenSaver
  - --talk-name=org.gnome.Mutter.IdleMonitor.*
  - --talk-name=org.cinnamon.ScreenSaver
  - --talk-name=org.mate.ScreenSaver
  - --talk-name=org.xfce.ScreenSaver
  - --own-name=org.mpris.MediaPlayer2.browseros.*
  # Browser data exchange. Broad host access is deliberately avoided; downloads,
  # desktop integration and PWA launchers are the minimum persistent host paths
  # used by the upstream Flatpak packaging.
  - --filesystem=host-etc:ro
  - --filesystem=home/.local/share/applications
  - --filesystem=home/.local/share/icons
  - --filesystem=xdg-desktop
  - --filesystem=xdg-download
  - --filesystem=/tmp
  - --filesystem=/run/.heim_org.h5l.kcm-socket
  - --persist=.pki
  # GNOME/KDE proxy settings.
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --talk-name=ca.desrt.dconf
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf
  - --env=GIO_EXTRA_MODULES=/app/lib/gio/modules
  - --env=GSETTINGS_BACKEND=dconf
  - --filesystem=~/.config/kioslaverc
modules:
  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53

  - name: browseros
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra.sh /app/bin/apply_extra
      - install -Dm755 browseros-wrapper /app/bin/browseros
      - install -Dm755 stub_sandbox.sh /app/share/browseros/stub_sandbox.sh
      - install -Dm644 cobalt.ini /app/etc/cobalt.ini
      - install -Dm644 com.browseros.BrowserOS.desktop /app/share/applications/com.browseros.BrowserOS.desktop
      - install -Dm644 com.browseros.BrowserOS.metainfo.xml /app/share/metainfo/com.browseros.BrowserOS.metainfo.xml
      - install -Dm644 com.browseros.BrowserOS.png /app/share/icons/hicolor/256x256/apps/com.browseros.BrowserOS.png
    sources:
      # BEGIN MANAGED EXTRA-DATA
      - type: extra-data
        filename: browseros.deb
        only-arches:
          - x86_64
        url: https://github.com/browseros-ai/BrowserOS/releases/download/v0.46.0/BrowserOS_v0.46.0_amd64.deb
        sha256: 3c1fee9ec80f37c671e3415f07b1f03824ce9568e01fd5e1b5ae666b876cf6db
        size: 274366584
      # END MANAGED EXTRA-DATA
      - type: file
        path: apply_extra.sh
      - type: file
        path: browseros-wrapper
      - type: file
        path: stub_sandbox.sh
      - type: file
        path: cobalt.ini
      - type: file
        path: com.browseros.BrowserOS.desktop
      - type: file
        path: com.browseros.BrowserOS.metainfo.xml
      - type: file
        path: com.browseros.BrowserOS.png
